<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon game</title>
    <link href = "simon.css" rel = "stylesheet">
</head>
<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to start the game</h3>
    <div class="btn-container">
        <div class="line1">
            <div class="btn c1" id = "c1" type="button"></div>
            <div class="btn c3" id = "c3"  type="button"></div>
        </div>
        <div class="line2">
            <div class="btn c2" id = "c2"  type="button"></div>
            <div class="btn c4" id = "c4"  type="button"></div>
        </div>
    </div>
    <script src="simon.js"></script>
</body>
</html>
